# buildiso profile for the Artix TUI installer ISO.
#
# Build with:  sudo buildiso -p <this-profile-name>
#
# The key differences from a stock profile:
#   * autologin is disabled — we replace getty on tty1 with the installer
#     service in live-overlay/etc/dinit.d/installer (+ the launch wrapper),
#   * GRUB/efiboot menu timeout is zeroed so there is no welcome screen.

# Display manager / desktop are intentionally empty: the live image is a TUI.
displaymanager="none"
autologin="no"

# Hostname of the live system.
hostname="artix-live"

# Extra files copied verbatim into the live root come from ./live-overlay/.
# (Place the compiled installer at live-overlay/usr/bin/artix-installer and the
#  nftables.conf at live-overlay/usr/share/artix-installer/nftables.conf before
#  building.)
