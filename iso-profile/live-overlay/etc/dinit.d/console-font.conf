# /etc/dinit.d/console-font — apply the live console font before the installer.
#
# Reads FONT= from /etc/vconsole.conf and applies it with setfont so the TUI's
# Unicode glyphs render crisply on tty1. Oneshot: runs once at boot, no daemon.

type = scripted
command = /bin/sh -c '. /etc/vconsole.conf 2>/dev/null; [ -n "$FONT" ] && setfont "$FONT" || true'
