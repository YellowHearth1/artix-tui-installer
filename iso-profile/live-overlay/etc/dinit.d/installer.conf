# /etc/dinit.d/installer — live-ISO autostart on tty1.
#
# Runs the TUI installer instead of a login getty. The launch wrapper
# (installer-launch) gives it a controlling terminal via setsid -c, which a
# bare process service does not provide.
#
# restart = true keeps the installer present if it exits; the wrapper falls
# back to a shell on crash so the image stays debuggable.

type = process
command = /usr/bin/installer-launch
restart = true
depends-on = dbus
depends-on = console-font
