# Live-console font + keymap.
#
# The TUI installer runs on a Linux virtual terminal (tty1), which can only use
# PSF console fonts — NOT TTF/Nerd fonts. Terminus has broad Unicode coverage
# and renders the installer's box-drawing and geometric glyphs (● ▸ ⬡ ◉ ▎)
# crisply, so we set it as the live console font.
#
# ter-118n = Terminus, normal weight, good size for common resolutions.
# (For HiDPI you may prefer ter-128n or ter-132n.)
FONT=ter-118n
KEYMAP=us
