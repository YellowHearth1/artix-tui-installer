# Override the live ISO GRUB menu to skip the welcome screen entirely.
#
# Place this so it overrides the profile's generated grub.cfg / loopback.cfg.
# timeout=0 + a single default entry boots straight into the live system,
# which then autostarts the installer on tty1 (see dinit installer service).

set default=0
set timeout=0
set timeout_style=hidden

menuentry "Artix Installer" {
    set gfxpayload=keep
    linux /boot/vmlinuz-x86_64 root=live:LABEL=ARTIX_INSTALL rw quiet loglevel=3
    initrd /boot/initramfs-x86_64.img
}
