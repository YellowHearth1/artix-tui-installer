fsopt_summary = "Опції ФС"
fsopt_none = "стандартно (немає)"
fsopt_open_hint = "[o] налаштувати"
fsopt_modal_title = "Опції файлової системи"
fsopt_modal_hint = "Space перемкнути · ↑↓ рух · Enter/Esc закрити"
fsdesc_noatime = "Не записувати час останнього доступу до кожного файлу (atime). Виграш: уникає крихітного запису на кожне читання — трохи менше зносу SSD і трохи швидше читання. Втрата: програми, що покладаються на час доступу (деякі поштові клієнти, а також утиліти бекапу чи очищення кешу, які видаляють файли за давністю невикористання), можуть працювати неправильно. Типово вимкнено: Linux і так використовує relatime, який уникає більшості записів atime, тож додатковий виграш тут невеликий."
fsdesc_subvolumes = "Створити окремі підтоми btrfs: @ (система), @home (ваші файли), @snapshots, @log, @cache. Виграш: знімки (snapshot) системи окремо від даних — відкат за секунди після невдалого оновлення, не чіпаючи /home; готово під snapper/Timeshift. @log і @cache не потрапляють у знімки системи, тож не роздувають їх. Втрата: трохи складніша структура, але по суті нічого не втрачаєте. Рекомендовано для btrfs."
fsdesc_compress = "Прозоро стискати дані алгоритмом zstd під час запису. Виграш: економія місця (на тексті, коді й логах часто 30–50%) і навіть швидше читання на повільних дисках, бо читається менше байтів. Втрата: невеликі витрати CPU на запис; уже стиснуте (відео, JPEG, архіви) визначається й не чіпається. Для щоденної системи це майже завжди вигідно."
fsdesc_discard = "Повідомляти SSD, які блоки звільнено (TRIM), безперервно у фоні. Виграш: накопичувач зберігає швидкість запису з часом, а не сповільнюється в міру заповнення. Втрата: корисно лише на SSD/NVMe — на звичайному HDD сенсу немає; async-форма працює у фоні, тож не гальмує запис, як старий синхронний discard. Альтернатива — періодичний таймер fstrim."
fschar_ext4 = "ext4 — надійна, швидка й перевірена класична ФС; безпечний вибір для більшості систем."
fschar_btrfs = "btrfs — снапшоти й миттєвий відкат, стиснення zstd та підтоми, але лише якщо їх увімкнути."
fschar_xfs = "xfs — висока продуктивність на великих файлах і паралельних записах; згодом не зменшується."
fschar_f2fs = "f2fs — створена під флеш-пам'ять і SSD (телефони, eMMC, деякі NVMe)."
fschar_jfs = "jfs — легка, з малим навантаженням на CPU, але слабко підтримується (застаріла)."
fschar_ext3 = "ext3 — старіша журнальована ФС; без вагомої причини краще обрати ext4 (застаріла)."
fschar_ext2 = "ext2 — без журналу, годиться для USB-флешок, але ризикованіша при втраті живлення (застаріла)."
fsopt_cta = "Натисніть [o], щоб задати додаткові параметри."
fsopt_encrypt = "Шифрування (LUKS)"
fsdesc_encrypt = "Шифрує весь диск через LUKS. Виграш: без ключа дані недоступні — захищає, якщо диск украдуть чи загублять. Розблокування автоматичне: ключ зберігається на зашифрованому корені, тож другого пароля при завантаженні не треба. Втрата: невеликі накладні витрати на шифрування; має сенс лише коли корінь теж зашифровано (інакше ключ лежатиме у відкритому вигляді)."
