fsopt_summary = "Filesystem options"
fsopt_none = "standard (none)"
fsopt_open_hint = "[o] configure"
fsopt_modal_title = "Filesystem options"
fsopt_modal_hint = "Space toggle · ↑/↓ options · w/s description · Enter/Esc close"
fsdesc_noatime = "Don't record when each file was last read (its access time, atime). Gain: skips a tiny write on every read — a little less SSD wear and slightly faster reads. Loss: programs that rely on access times (some mail clients, and backup or cache-cleanup tools that delete files by how long they've gone unused) can misbehave. Off by default: Linux already uses relatime, which avoids most atime writes, so the extra benefit here is modest."
fsdesc_subvolumes = "Create separate btrfs subvolumes: @ (system), @home (your files), @snapshots, @log, @cache. Gain: snapshot the system independently of your data — roll back in seconds after a bad update without touching /home; ready for snapper/Timeshift. @log and @cache stay out of system snapshots so they don't bloat them. Loss: a slightly more complex layout, but essentially nothing is given up. Recommended for btrfs."
fsopt_snapshots = "Auto-snapshots (snapper + snap-pac)"
fsdesc_snapshots = "Take a btrfs snapshot before and after every pacman action (install/upgrade/remove) via snapper + snap-pac. Gain: a bad update rolls back in seconds — return to the exact state from before. Automatically enables subvolumes (needs @snapshots). Old snapshots are pruned on a schedule via cron (dinit has no systemd timers), keeping the latest ~10. Loss: some space for the snapshots and a tiny delay on each pacman action. Very handy on an Arch-like daily driver. Roll back with the artix-rollback command (on GRUB there is also a System Rollback boot-menu entry)."
fsdesc_compress = "Transparently compress data with zstd as it's written. Gain: saves disk space (often 30–50% on text, code and logs) and can even speed up reads on slow disks, since fewer bytes are read. Loss: a small CPU cost on writes; already-compressed files (video, JPEG, archives) are detected and left alone. On a daily-driver desktop this is almost always a win."
fsdesc_discard = "Tell the SSD which blocks are now free (TRIM), continuously in the background. Gain: the drive keeps its write performance over time instead of slowing as it fills. Loss: only useful on SSDs/NVMe — pointless on a spinning HDD; the async form runs in the background so it doesn't stall writes like the old synchronous discard did. An alternative is a periodic fstrim timer."
fschar_ext4 = "ext4 — the reliable, fast, mature classic; a safe pick for most systems."
fschar_btrfs = "btrfs — snapshots and instant rollback, zstd compression and subvolumes, but only once you enable them."
fschar_xfs = "xfs — high performance with large files and parallel writes; cannot be shrunk later."
fschar_f2fs = "f2fs — built for flash storage and SSDs (phones, eMMC, some NVMe)."
fschar_jfs = "jfs — lightweight with low CPU overhead, but lightly maintained (legacy)."
fschar_ext3 = "ext3 — an older journaled filesystem; prefer ext4 unless you have a reason (legacy)."
fschar_ext2 = "ext2 — no journal, fine for USB sticks but riskier on power loss (legacy)."
fsopt_cta = "Press [o] to set additional options."
fsopt_encrypt = "Encryption (LUKS)"
fsdesc_encrypt = "Encrypts the whole disk with LUKS. Gain: without the key the data is unreadable — protects you if the disk is lost or stolen. Unlocking is automatic: the key is stored on the encrypted root, so no second password at boot. Loss: a small encryption overhead; only meaningful when root is encrypted too (otherwise the key sits in the clear)."
